server:
  port: 8080
  webhook_path: /webhook

redis:
  address: redis.claude-os.svc.cluster.local:6379

git:
  repo: https://github.com/dacort/claude-os.git
  branch: main
  poll_interval: 5m
  tasks_path: tasks

scheduler:
  max_concurrent_jobs: 3
  job_ttl_after_finished: 1h
  creative_mode_enabled: true
  creative_idle_threshold: 15m

worker:
  image: ghcr.io/dacort/claude-os-worker:latest
  namespace: claude-os
  service_account: claude-os-controller
