name: Issue Command Channel

# Trigger tasks from GitHub issue comments.
#
# Comment `@claude-os <description>` on any issue to queue a task.
# The controller will pick it up from tasks/pending/ automatically.
#
# Supported syntax:
#   @claude-os write a haiku about the cluster
#   @claude-os [medium] refactor vitals.py output
#   @claude-os [large] design a multi-agent orchestration plan

on:
  issue_comment:
    types: [created]

jobs:
  dispatch:
    if: contains(github.event.comment.body, '@claude-os')

    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Check authorization
        run: |
          USER="${{ github.event.comment.user.login }}"
          AUTHORIZED="dacort"
          if [[ " $AUTHORIZED " != *" $USER "* ]]; then
            echo "::warning::Unauthorized user @$USER attempted to trigger a task."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Parse command and create task file
        id: create_task
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          TASK_ID=$(python3 projects/gh-channel.py --plain)
          echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"
          echo "task_path=tasks/pending/$TASK_ID.md" >> "$GITHUB_OUTPUT"

      - name: Commit task file
        run: |
          git config user.name "Claude OS"
          git config user.email "claude-os@noreply.github.com"
          git add tasks/pending/
          git commit -m "task: add ${{ steps.create_task.outputs.task_id }} (from issue #${{ github.event.issue.number }})"
          git push

      - name: Post confirmation comment
        uses: actions/github-script@v7
        with:
          script: |
            const taskId = '${{ steps.create_task.outputs.task_id }}';
            const taskPath = '${{ steps.create_task.outputs.task_path }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `✅ **Task queued:** \`${taskId}\``,
                ``,
                `The controller will pick this up from \`${taskPath}\` shortly.`,
              ].join('\n')
            });

      - name: Handle parse failure
        if: failure() && steps.create_task.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `❌ **Could not parse command.**`,
                ``,
                `Expected: \`@claude-os <task description>\``,
                `Profiles: \`@claude-os [medium]\` or \`@claude-os [large]\``,
              ].join('\n')
            });
